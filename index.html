<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Barber Elevate Studio — Premium cuts, clean fades, and sharp styles." />
    <!-- Match the iOS Safari status bar tint to the sticky nav's cream base
         so scrolling content doesn't bleed into the system area. -->
    <meta name="theme-color" content="#F6F4F1" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Barber Elevate Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Barlow+Condensed:wght@400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- iOS status-bar paint. A real DOM node (not a pseudo-element) painted
         over the top safe-area inset so the iPhone notch / Dynamic Island /
         status-bar region is always solid #F6F4F1 cream, regardless of what
         content is scrolled underneath. Uses max z-index and inline styles
         so it survives CSS bundling, cache, and React mount timing. -->
    <div aria-hidden="true" style="position:fixed;top:0;left:0;right:0;height:env(safe-area-inset-top,0px);background:#F6F4F1;z-index:2147483647;pointer-events:none;"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
